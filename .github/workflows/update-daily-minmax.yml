name: Update daily minmax

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate daily minmax JSON
        run: |
          python extract_sfl_trade_daily_minmax.py --output daily_minmax_all.json

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- daily_minmax_all.json; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily_minmax_all.json
          git commit -m "chore: update daily minmax data"
          git push
